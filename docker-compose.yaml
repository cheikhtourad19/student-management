services:
  mysql:
    image: mysql:8.4
    container_name: student-management-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: student_management
      MYSQL_USER: gheith
      MYSQL_PASSWORD: esprim
      MYSQL_ROOT_PASSWORD: esprim
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - exam-devops-esprim

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: student-management-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8089:8089"
    environment:
      SERVER_PORT: 8089
      SPRING_APPLICATION_NAME: student-management
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/student_management?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: gheith
      SPRING_DATASOURCE_PASSWORD: esprim
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.MySQLDialect
    networks:
      - exam-devops-esprim

volumes:
  mysql_data:

networks:
  exam-devops-esprim:
    driver: bridge

